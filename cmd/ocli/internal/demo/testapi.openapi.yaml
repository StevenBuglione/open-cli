openapi: 3.1.0
info:
  title: Test API
  description: |
    Deterministic REST fixture for product-level tests.
    Provides CRUD on items, pagination, deliberate error endpoints,
    and a long-running operations pattern.
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Local fixture (override in tests)

paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      tags: [items]
      parameters:
        - name: tag
          in: query
          schema: { type: string }
          description: Filter by tag
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Paginated list of items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
    post:
      operationId: createItem
      summary: Create an item
      tags: [items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getItem
      summary: Fetch a single item
      tags: [items]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateItem
      summary: Replace an item
      tags: [items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteItem
      summary: Delete an item
      tags: [items]
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /errors/unauthorized:
    get:
      operationId: triggerUnauthorized
      summary: Always returns 401
      tags: [errors]
      responses:
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /errors/forbidden:
    get:
      operationId: triggerForbidden
      summary: Always returns 403
      tags: [errors]
      responses:
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /errors/rate-limited:
    get:
      operationId: triggerRateLimited
      summary: Always returns 429
      tags: [errors]
      responses:
        "429":
          description: Too many requests
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /errors/internal:
    get:
      operationId: triggerInternalError
      summary: Always returns 500
      tags: [errors]
      responses:
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /operations:
    post:
      operationId: createOperation
      summary: Start a long-running operation
      tags: [operations]
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"

  /operations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getOperation
      summary: Poll a long-running operation
      tags: [operations]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Item:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        tags:
          type: array
          items: { type: string }
        createdAt:
          type: string
          format: date-time

    ItemInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tags:
          type: array
          items: { type: string }

    ItemListResponse:
      type: object
      required: [items, total, page, pageSize, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    Operation:
      type: object
      required: [id, status, progress, createdAt]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, running, done, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
